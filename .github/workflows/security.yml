name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC.  Catches new CVEs against pinned deps even
    # if no code changes have landed.
    - cron: "0 6 * * 1"

# Least-privilege defaults.  Individual jobs elevate (e.g. SARIF upload
# needs security-events: write) only where required.
permissions:
  contents: read

env:
  PYTHONIOENCODING: utf-8

jobs:
  bandit:
    runs-on: ubuntu-latest
    name: Bandit (SAST)
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]>=1.7,<2"

      # Informational text run — `--exit-zero` so findings don't fail
      # the job.  Real triage happens via the SARIF upload below, which
      # surfaces findings in the Security tab as code-scanning alerts.
      # CI green here means "we ran bandit", not "no findings".
      - name: Run bandit (informational text output)
        run: |
          bandit -r . \
            --exclude ./tests,./.venv,./build,./dist,./.git,./__pycache__ \
            -ll \
            --exit-zero

      # SARIF upload — always run.  `|| true` is intentional: bandit
      # returns non-zero on findings even in SARIF mode and we want the
      # upload step to still get the file.
      - name: Run bandit (SARIF for code scanning)
        run: |
          bandit -r . \
            --exclude ./tests,./.venv,./build,./dist,./.git,./__pycache__ \
            -f sarif -o bandit.sarif || true

      - name: Upload bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif
          category: bandit

  pip-audit:
    runs-on: ubuntu-latest
    name: pip-audit (dependency CVEs)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
          pip install "pip-audit>=2.7,<3"

      # Removed the previous SARIF step: pip-audit doesn't support
      # `--format sarif` (its valid formats are columns / json /
      # cyclonedx-json / cyclonedx-xml / markdown).  CVE alerts land in
      # the Security tab via Dependabot, which already scans the
      # lockfile in near-real-time without needing CI to upload SARIF.
      # --strict fails the job on any CVE so triage is forced.
      - name: Run pip-audit
        run: pip-audit --strict --progress-spinner off

  gitleaks:
    runs-on: ubuntu-latest
    name: gitleaks (secret scan)
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so gitleaks can scan past commits, not just HEAD.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
