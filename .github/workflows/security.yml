name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC.  Catches new CVEs against pinned deps even
    # if no code changes have landed.
    - cron: "0 6 * * 1"

# Least-privilege defaults.  Individual jobs elevate (e.g. SARIF upload
# needs security-events: write) only where required.
permissions:
  contents: read

env:
  PYTHONIOENCODING: utf-8

jobs:
  bandit:
    runs-on: ubuntu-latest
    name: Bandit (SAST)
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]>=1.7,<2"

      - name: Run bandit (human-readable, fails on high-severity findings)
        run: |
          bandit -r . \
            --exclude ./tests,./.venv,./build,./dist,./.git,./__pycache__ \
            -ll
        continue-on-error: true

      - name: Run bandit (SARIF for code scanning)
        run: |
          bandit -r . \
            --exclude ./tests,./.venv,./build,./dist,./.git,./__pycache__ \
            -f sarif -o bandit.sarif || true

      - name: Upload bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif
          category: bandit

  pip-audit:
    runs-on: ubuntu-latest
    name: pip-audit (dependency CVEs)
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
          pip install "pip-audit>=2.7,<3"

      - name: Run pip-audit (text)
        run: pip-audit --strict --progress-spinner off
        continue-on-error: true

      - name: Run pip-audit (SARIF)
        run: pip-audit --format sarif --output pip-audit.sarif || true

      - name: Upload pip-audit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: pip-audit.sarif
          category: pip-audit

  gitleaks:
    runs-on: ubuntu-latest
    name: gitleaks (secret scan)
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan past commits, not just HEAD.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
