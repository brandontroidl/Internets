name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC.  Catches new CVEs against pinned deps even
    # if no code changes have landed.
    - cron: "0 6 * * 1"

# Least-privilege defaults.  Individual jobs elevate (e.g. SARIF upload
# needs security-events: write) only where required.
permissions:
  contents: read

env:
  PYTHONIOENCODING: utf-8

jobs:
  bandit:
    runs-on: ubuntu-latest
    name: Bandit (SAST)
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]>=1.7,<2"

      # Informational text run — every finding visible in CI log.
      # `-ll` filters out LOW-severity noise; `--exit-zero` so the
      # informational pass doesn't fail the job — the HIGH gate below
      # is where blocking happens.
      - name: Run bandit (informational, MEDIUM+ severity)
        run: |
          bandit -r . \
            --exclude ./tests,./.venv,./build,./dist,./.git,./__pycache__ \
            -ll \
            --exit-zero

      # Gating step — fail CI on any HIGH-severity finding (HIGH severity
      # AND HIGH confidence).  Lower-tier findings still appear in the
      # Security tab via SARIF but don't block merges.  Adjust thresholds
      # via -i (severity) and -c (confidence) if you ever need to tighten.
      - name: Fail on HIGH-severity bandit findings
        run: |
          bandit -r . \
            --exclude ./tests,./.venv,./build,./dist,./.git,./__pycache__ \
            -iii -ll

      # SARIF upload — always run, even if the HIGH gate above failed
      # (we still want the findings in the Security tab so they can be
      # triaged / acknowledged).  `|| true` so the SARIF generation
      # itself never blocks the upload.
      - name: Run bandit (SARIF for code scanning)
        if: always()
        run: |
          bandit -r . \
            --exclude ./tests,./.venv,./build,./dist,./.git,./__pycache__ \
            -f sarif -o bandit.sarif || true

      - name: Upload bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        with:
          sarif_file: bandit.sarif
          category: bandit

  pip-audit:
    runs-on: ubuntu-latest
    name: pip-audit (dependency CVEs)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install project + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
          pip install "pip-audit>=2.7,<3"

      # Removed the previous SARIF step: pip-audit doesn't support
      # `--format sarif` (its valid formats are columns / json /
      # cyclonedx-json / cyclonedx-xml / markdown).  CVE alerts land in
      # the Security tab via Dependabot, which already scans the
      # lockfile in near-real-time without needing CI to upload SARIF.
      # --strict fails the job on any CVE so triage is forced.
      # --ignore-vuln PYSEC-2025-183 (pyjwt 2.10.1+):
      #   The CVE is DISPUTED by the pyjwt maintainers — the alleged
      #   "weak encryption" concerns the key length chosen by the
      #   application that *uses* pyjwt, not the library itself.  In
      #   this bot pyjwt is used only for Apple WeatherKit JWT signing
      #   with Apple-issued .p8 ES256 keys (Apple picks the key size,
      #   not us); the finding does not apply to our usage.  No fix
      #   release exists because the maintainers consider it non-issue.
      #   Re-evaluate if a fixed version is ever published.
      - name: Run pip-audit
        run: pip-audit --strict --progress-spinner off --ignore-vuln PYSEC-2025-183

  gitleaks:
    runs-on: ubuntu-latest
    name: gitleaks (secret scan)
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Full history so gitleaks can scan past commits, not just HEAD.
          fetch-depth: 0

      - name: Run gitleaks
        # v2.3.9 (latest as of 2025-04) still ships its JS shim on Node 20.
        # GitHub deprecates Node 20 runners on 2026-09-16 and forces Node 24
        # on 2026-06-02.  Opting in early via FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
        # so we surface any incompatibility now rather than at the deadline.
        # Remove this env once upstream releases a Node-24 native version.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
