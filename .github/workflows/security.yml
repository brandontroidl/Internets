name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC.  Catches new CVEs against pinned deps even
    # if no code changes have landed.
    - cron: "0 6 * * 1"

# Least-privilege defaults.  Individual jobs elevate (e.g. SARIF upload
# needs security-events: write) only where required.
permissions:
  contents: read

env:
  PYTHONIOENCODING: utf-8

jobs:
  bandit:
    runs-on: ubuntu-latest
    name: Bandit (SAST)
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]>=1.7,<2"

      # Informational text run — every finding visible in CI log.
      # `-ll` filters out LOW-severity noise; `--exit-zero` so the
      # informational pass doesn't fail the job — the HIGH gate below
      # is where blocking happens.
      - name: Run bandit (informational, MEDIUM+ severity)
        run: |
          bandit -r . \
            --exclude ./tests,./.venv,./build,./dist,./.git,./__pycache__ \
            -ll \
            --exit-zero

      # Gating step — fail CI on any HIGH-severity finding (HIGH severity
      # AND HIGH confidence).  Lower-tier findings still appear in the
      # Security tab via SARIF but don't block merges.  Adjust thresholds
      # via -i (severity) and -c (confidence) if you ever need to tighten.
      - name: Fail on HIGH-severity bandit findings
        run: |
          bandit -r . \
            --exclude ./tests,./.venv,./build,./dist,./.git,./__pycache__ \
            -iii -ll

      # SARIF upload — always run, even if the HIGH gate above failed
      # (we still want the findings in the Security tab so they can be
      # triaged / acknowledged).  `|| true` so the SARIF generation
      # itself never blocks the upload.
      - name: Run bandit (SARIF for code scanning)
        if: always()
        run: |
          bandit -r . \
            --exclude ./tests,./.venv,./build,./dist,./.git,./__pycache__ \
            -f sarif -o bandit.sarif || true

      - name: Upload bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        with:
          sarif_file: bandit.sarif
          category: bandit

  pip-audit:
    runs-on: ubuntu-latest
    name: pip-audit (dependency CVEs)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install project + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
          pip install "pip-audit>=2.7,<3"

      # Removed the previous SARIF step: pip-audit doesn't support
      # `--format sarif` (its valid formats are columns / json /
      # cyclonedx-json / cyclonedx-xml / markdown).  CVE alerts land in
      # the Security tab via Dependabot, which already scans the
      # lockfile in near-real-time without needing CI to upload SARIF.
      # --strict fails the job on any CVE so triage is forced.
      - name: Run pip-audit
        run: pip-audit --strict --progress-spinner off

  gitleaks:
    runs-on: ubuntu-latest
    name: gitleaks (secret scan)
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # Full history so gitleaks can scan past commits, not just HEAD.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
