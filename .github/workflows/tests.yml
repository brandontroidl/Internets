name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CWE-275 / CodeQL actions/missing-workflow-permissions:
# Explicit least-privilege GITHUB_TOKEN scope.  This workflow only checks
# out code and runs tests — it never writes to the repo, creates issues,
# or publishes packages.
permissions:
  contents: read

env:
  # Belt-and-braces alongside the explicit encoding='utf-8' kwargs in
  # tests/run_tests.py — protects any helper that still relies on the
  # platform's default locale (cp1252 on Windows by default).
  PYTHONIOENCODING: utf-8

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # requirements.txt is the canonical runtime install (see README).
        # `pip install -e ".[dev]"` adds pytest/coverage/bandit/pip-audit/build.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run standalone test suite
        run: python tests/run_tests.py

      - name: Run pytest
        run: pytest tests/ -v --tb=short --strict-markers

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run coverage
        run: |
          coverage run -m pytest tests/ --strict-markers
          coverage xml
          coverage report --fail-under=75

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check syntax (all top-level + audit_log + process_lock + metrics)
        run: |
          python -m py_compile \
            internets.py \
            sender.py \
            store.py \
            protocol.py \
            hashpw.py \
            config.py \
            botlog.py \
            admin_cmds.py \
            console.py \
            secret_store.py \
            audit_log.py \
            process_lock.py \
            metrics.py

      - name: Check syntax (weather_providers)
        run: |
          find weather_providers -name '*.py' -exec python -m py_compile {} +

      - name: Check syntax (modules)
        run: |
          for f in modules/*.py; do python -m py_compile "$f"; done
