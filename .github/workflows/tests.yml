name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CWE-275 / CodeQL actions/missing-workflow-permissions:
# Explicit least-privilege GITHUB_TOKEN scope.  This workflow only checks
# out code and runs tests — it never writes to the repo, creates issues,
# or publishes packages.
permissions:
  contents: read

env:
  # Ensure Python uses UTF-8 on all platforms (prevents cp1252 crashes on Windows).
  PYTHONIOENCODING: utf-8

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install -e ".[dev]"

      - name: Run test suite
        run: python tests/run_tests.py

      - name: Run pytest
        run: pytest tests/ -v --tb=short --strict-markers

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install -e ".[dev]"

      - name: Run coverage
        run: |
          coverage run -m pytest tests/ --strict-markers
          coverage xml
          coverage report --fail-under=75

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax (core)
        run: |
          python -m py_compile \
            internets.py \
            sender.py \
            store.py \
            protocol.py \
            hashpw.py \
            config.py \
            botlog.py \
            admin_cmds.py \
            console.py \
            secret_store.py

      - name: Check syntax (weather_providers)
        run: |
          find weather_providers -name '*.py' -exec python -m py_compile {} +

      - name: Check syntax (modules)
        run: |
          for f in modules/*.py; do python -m py_compile "$f"; done
