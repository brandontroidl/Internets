name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CWE-275 / CodeQL actions/missing-workflow-permissions:
# Explicit least-privilege GITHUB_TOKEN scope.  This workflow only checks
# out code and runs tests — it never writes to the repo, creates issues,
# or publishes packages.
permissions:
  contents: read

env:
  # Ensure Python uses UTF-8 on all platforms (prevents cp1252 crashes on Windows).
  PYTHONIOENCODING: utf-8

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run test suite
        run: python tests/run_tests.py

      - name: Run pytest (if available)
        run: |
          pip install pytest
          pytest tests/ -v --tb=short
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax (core)
        run: python -m py_compile internets.py sender.py store.py protocol.py hashpw.py

      - name: Check syntax (weather_providers)
        run: |
          python -m py_compile weather_providers/__init__.py
          python -m py_compile weather_providers/base.py
          python -m py_compile weather_providers/_http.py
          python -m py_compile weather_providers/openmeteo.py
          python -m py_compile weather_providers/weatherapi.py
          python -m py_compile weather_providers/tomorrowio.py

      - name: Check syntax (modules)
        run: |
          for f in modules/*.py; do python -m py_compile "$f"; done
