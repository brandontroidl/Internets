[irc]
server = irc.chatnplay.org
port = 6697
# ssl = true  →  SSL/TLS connection (use port 6697)
# ssl = false →  plain TCP        (use port 6667)
ssl = true
# ssl_verify = false disables certificate verification.
# Use this if your server has a self-signed cert and the bot crashes with
# CERTIFICATE_VERIFY_FAILED. Leave true for public servers when possible.
ssl_verify = false
nickname = Internets
realname = IRC Bot
channels = #chatnplay
# Password for NickServ (optional, leave blank if not needed)
nickserv_password =

[bot]
# Command prefix for bot commands
command_prefix = .
# How long to wait between weather API calls (seconds) to avoid rate limiting
api_cooldown = 10
# Default location if user doesn't provide one (use a US zip code or lat,lon)
default_location = 40.7128,-74.0060
# File where per-nick registered locations are stored
locations_file = locations.json

[weather]
# weather.gov API — no API key needed!
# User-Agent is REQUIRED by weather.gov API (use your contact info)
user_agent = WeatherBot/1.0 (your@email.com)
# Units: us (imperial) or si (metric)
units = us

[logging]
level = INFO
log_file = Internets.log
