[irc]
server = irc.chatnplay.org
port = 6697
; ssl = true  → SSL/TLS connection (port 6697)
; ssl = false → plain TCP         (port 6667)
ssl = true
; ssl_verify = false for servers with self-signed certs
ssl_verify = false
nickname = Internets
realname = Weather IRC Bot
; No channels listed here — the bot is invite-only.
; /INVITE Internets #yourchannel   to add it to a channel.
; Joined channels are saved to channels.json and rejoined on restart.
nickserv_password =

[bot]
command_prefix = .
api_cooldown = 10
flood_cooldown = 3          ; global per-nick cooldown applied to ALL commands (seconds)
default_location = 40.7128,-74.0060
locations_file = locations.json
channels_file  = channels.json
users_file     = users.json
modules_dir    = modules
; Comma-separated list of modules to load automatically on startup
autoload = weather,location,calc,dice,urbandictionary,translate,channels

[admin]
; Hashed admin password for .load / .unload / .reload
;
; HOW TO SET THIS:
;   1. Run:  python hashpw.py --algo scrypt   (or bcrypt / argon2)
;   2. Paste the output line below
;
; Supported formats (plaintext passwords are REJECTED on startup):
;   scrypt$...   — Python stdlib, no extra packages  ← recommended default
;   bcrypt$...   — pip install bcrypt
;   argon2$...   — pip install argon2-cffi           ← strongest
;
; To authenticate:   /MSG Internets AUTH yourpassword
; To deauthenticate: /MSG Internets DEAUTH
;
; Leave blank to disable module management entirely.
password_hash =

[weather]
; Your contact info — REQUIRED by weather.gov API Terms of Service
user_agent = Internets/1.0 (your@email.com)
units = us

[logging]
level = INFO
log_file = internets.log
