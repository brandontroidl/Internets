[irc]
server = irc.chatnplay.org
port = 6697
; ssl = true  → SSL/TLS connection (port 6697)
; ssl = false → plain TCP         (port 6667)
ssl = true
; ssl_verify = false for servers with self-signed certs
ssl_verify = false
nickname = Internets
realname = Weather IRC Bot
; No channels listed here — the bot is invite-only.
; /INVITE Internets #yourchannel   to add it to a channel.
; Joined channels are saved to channels.json and rejoined on restart.
nickserv_password =

; Server password — sent as PASS before NICK/USER on connect.
; Required by some networks/bouncers. Leave blank if not needed.
server_password =

; IRC operator access — sent as OPER <name> <password> after motd.
; Leave both blank if not needed.
oper_name =
oper_password =

; User modes to set on connect (after MOTD). Applied before OPER.
; Common modes: +i (invisible), +w (wallops), +x (host cloaking)
; Example: +ix
user_modes =

; Oper-only modes to set after successful OPER (381 numeric).
; Example: +s (enable server notices), +H (hide oper status on some IRCds)
oper_modes =

; Server notice mask — set after OPER. Requires +s in oper_modes.
; Flags vary by IRCd. Common examples:
;   UnrealIRCd: c(connects) k(kills) o(oper) f(flood) j(junk) G(gline)
;   InspIRCd:   c(connects) k(kills) l(links) o(oper) q(quit) d(debug)
; Sent as: MODE <nick> +s <snomask>
; Example: +cCkKoO
oper_snomask =

[bot]
command_prefix = .
api_cooldown = 10
flood_cooldown = 3          ; global per-nick cooldown applied to ALL commands (seconds)
default_location = 40.7128,-74.0060
locations_file = locations.json
channels_file  = channels.json
users_file     = users.json
; Prune user tracking entries older than this many days (default 90).
; Prevents users.json from growing unbounded on busy networks.
user_max_age_days = 90
modules_dir    = modules
; Name of the IRC services bot for channel ownership verification.
; Common values: ChanServ (Anope, Atheme, Epona), X3, X2, Q
; Used by .join to verify the requesting user is the channel founder.
services_nick  = ChanServ
; Comma-separated list of modules to load automatically on startup
autoload = weather,location,calc,dice,urbandictionary,translate,channels

[admin]
; Hashed admin password for .load / .unload / .reload
;
; HOW TO SET THIS:
;   1. Run:  python hashpw.py --algo scrypt   (or bcrypt / argon2)
;   2. Paste the output line below
;
; Supported formats (plaintext passwords are REJECTED on startup):
;   scrypt$...   — Python stdlib, no extra packages  ← recommended default
;   bcrypt$...   — pip install bcrypt
;   argon2$...   — pip install argon2-cffi           ← strongest
;
; To authenticate:   /MSG Internets AUTH yourpassword
; To deauthenticate: /MSG Internets DEAUTH
;
; Leave blank to disable module management entirely.
password_hash =

[weather]
; Your contact info — used as User-Agent for geocoding and weather APIs.
user_agent = Internets/1.0 (your@email.com)
units = us

[weather_providers]
; Ordered list of weather providers (first success wins).
; Default: openmeteo (no key needed) → weatherapi → tomorrowio
; Only providers with valid API keys are activated.
priority = openmeteo, weatherapi, tomorrowio

; WeatherAPI.com — free tier: 1M calls/month
; Sign up: https://www.weatherapi.com/signup.aspx
weatherapi_key =

; Tomorrow.io — free tier: 500 calls/day
; Sign up: https://app.tomorrow.io/signup
tomorrowio_key =

[logging]
level = INFO
log_file = internets.log
; Log rotation — main log and debug log are both rotated.
max_bytes    = 5242880      ; 5 MB per file before rotating
backup_count = 3            ; keep 3 rotated copies (.1, .2, .3)
; Optional: separate debug log that captures ALL output including protocol
; traffic, regardless of the level setting above.  Leave blank to disable.
; Useful for diagnosing protocol issues without flooding the main log.
debug_file =
